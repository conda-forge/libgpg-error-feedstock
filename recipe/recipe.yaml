schema_version: 1

context:
  name: libgpg-error
  version: "1.59"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://gnupg.org/ftp/gcrypt/libgpg-error/${{ name }}-${{ version }}.tar.bz2
  sha256: a19bc5087fd97026d93cb4b45d51638d1a25202a5e1fbc3905799f424cfa6134

build:
  number: 0
  skip: win

requirements:
  build:
    - if: unix
      then: gnuconfig
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - if: unix
      then:
        - make
        - libtool
        - automake
        - xz-tools
    - if: osx
      then: gnuconfig
    - gettext-tools
    - pkg-config
  host:
    - if: osx
      then: libintl-devel
  run_exports:
    - ${{ pin_subpackage('libgpg-error') }}

tests:
  - script:
      - if: unix
        then: test -f $PREFIX/lib/libgpg-error${SHLIB_EXT}

about:
  license: LGPL-2.1-only
  license_file: COPYING
  summary: a small library that originally defined common error values for all GnuPG components
  homepage: https://www.gnupg.org/software/libgpg-error/index.html

extra:
  recipe-maintainers:
    - martindurant
    - mariusvniekerk
    - xhochy
